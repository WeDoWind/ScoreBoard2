<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The WindIQ WindEurope Annual Event 2026 Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg: #0b0f14;
    --surface: #131920;
    --surface2: #1c2530;
    --border: #253040;
    /* --accent: #00c8a0; */
    --accent: #53519e;
    --accent2: #0098f0;
    --text: #e8edf2;
    --muted: #5a7080;
    --gold: #f0b840;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 40px 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,160,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,160,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }

  header { 
    margin-bottom: 20px;
  }
  .logo-line { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  .windmill-icon { width: 36px; height: 36px; flex-shrink: 0; }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 36px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--text);
  }
  h1 span { color: var(--accent); }
  .subtitle {
    font-size: 14px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); font-weight: 500; margin-left: 50px;
  }

  .status-bar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px; font-size: 12px;
    font-family: 'Space Mono', monospace; color: var(--muted);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.live { background: var(--accent); animation: pulse 2s infinite; }
  .dot.error { background: #ff6060; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 16px 20px;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px; background: var(--accent);
  }
  .stat-label {
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'Space Mono', monospace; font-size: 28px;
    font-weight: 700; color: var(--accent);
  }

  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface2); }
  th {
    padding: 12px 16px; font-size: 10px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
    text-align: left; border-bottom: 1px solid var(--border);
  }
  td {
    padding: 13px 16px; font-size: 15px; font-weight: 500;
    border-bottom: 1px solid var(--border); letter-spacing: 0.5px;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.15s; }
  tbody tr:hover { background: var(--surface2); }
  .top-row td { background: rgba(0,200,160,0.05); }

  .rank-cell { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); width: 50px; }
  .medal { font-size: 18px; }
  .email-cell { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .val-cell { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--muted); text-align: right; }
  .diff-cell { font-family: 'Space Mono', monospace; font-size: 13px; text-align: right; font-weight: 700; }
  .diff-0   { color: var(--accent); }
  .diff-low { color: #80d0a0; }
  .diff-mid { color: var(--gold); }
  .diff-high{ color: #ff8060; }

  .score-cell { min-width: 160px; }
  .score-inner { display: flex; align-items: center; gap: 10px; }
  .bar-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 2px; }
  .score-num {
    font-family: 'Space Mono', monospace; font-size: 13px;
    font-weight: 700; color: var(--text); min-width: 36px; text-align: right;
  }

  .err-msg { font-family: 'Space Mono', monospace; font-size: 12px; color: #ff6060; padding: 20px; text-align: center; }
  .loading-msg { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); padding: 40px; text-align: center; letter-spacing: 2px; }

  @media (max-width: 600px) {
    .stats { grid-template-columns: 1fr 1fr; }
    th.hide-sm, td.hide-sm { display: none; }
    h1 { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-line">
      <svg width="350" height="100" xmlns="https://www.wedowind.ch/img/we-do-wind-logo.svg">       
           <image height="100" width="350" href="https://www.wedowind.ch/img/we-do-wind-logo.svg" />    
      </svg>
      <h1>Wind<span>IQ</span>  Challenge</h1>
    </div>
    <div class="subtitle">The WindIQ WindEurope Annual Event 2026 Challenge Scoreboard</div>
  </header>

  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>

  <div id="stats"></div>
  <div id="out"><div class="loading-msg">// LOADING LEADERBOARD...</div></div>

</div>

<script>
  /* ============================================================
     CONFIGURATION — only edit this section
     ============================================================ */

  const CSV_URL = 'https://raw.githubusercontent.com/WeDoWind/ScoreBoard2/main/docs/entries_list.csv';

  // Correct answers — not visible to users
  const CORRECT_V3 = 10.1;
  const CORRECT_V2 = 7.5;
  const CORRECT_V1 = 23.7;
  // Auto-refresh interval in seconds
  const REFRESH_SECONDS = 60;

  /* ============================================================ */

  const medals = ['🥇', '🥈', '🥉'];

  function setStatus(state, msg) {
    document.getElementById('statusDot').className = 'dot' + (state === 'live' ? ' live' : state === 'error' ? ' error' : '');
    document.getElementById('statusText').textContent = msg;
  }

  function diffClass(d) {
    if (d === 0) return 'diff-0';
    if (d <= 10) return 'diff-low';
    if (d <= 30) return 'diff-mid';
    return 'diff-high';
  }

  function processRows(rows) {
    const entries = [];

    for (const r of rows) {
      const keys = Object.keys(r) ;
      console.log(keys)
      const participant = r[keys[8]] || '—';
      // const email = r[keys[1]] || '—';
      // IMPORTANT: numeric values are columns 5,6,7
      const values = Object.values(r);

      // Debug once to see structure
      console.log(values);

      // Try both possible positions (because of duplicate headers)
      const v1 = parseFloat(values[4]) || parseFloat(values[1]);
      const v2 = parseFloat(values[5]) || parseFloat(values[2]);
      const v3 = parseFloat(values[6]) || parseFloat(values[3]);

      if (isNaN(v1) || isNaN(v2) || isNaN(v3)) continue;

      // RMSE calculation
      const mse =
        (Math.pow(v1 - CORRECT_V1, 2) +
        Math.pow(v2 - CORRECT_V2, 2) +
        Math.pow(v3 - CORRECT_V3, 2)) / 3;

      const rmse = Math.sqrt(mse);

      // Optional score (higher is better)
      const score = Math.max(0, 100 - Math.round(rmse * 2));

      entries.push({ participant, v1, v2, v3, rmse, score, timestamp: r[keys[0]] });
    }

    // Sort by RMSE (lower = better)
    entries.sort((a, b) => a.rmse - b.rmse);

    return entries;
  }
  function groupByDay(entries) {
      const groups = {};

      entries.forEach(e => {
        if (!e.timestamp) return;

        // Extract date part (before space)
        const day = e.timestamp.split(' ')[0];

        if (!groups[day]) groups[day] = [];
        groups[day].push(e);
      });

      // Sort each day by RMSE
      Object.keys(groups).forEach(day => {
        groups[day].sort((a, b) => a.rmse - b.rmse);
      });

      return groups;
    }

  function render(entries) {
    // Stats
    const avgRmse = (entries.reduce((s, e) => s + e.rmse, 0) / entries.length).toFixed(2);
    const perfect = entries.filter(e => e.rmse === 0).length; 
    document.getElementById('stats').innerHTML = `
      <div class="stats">
        <div class="stat-card"><div class="stat-label">Participants</div><div class="stat-value">${entries.length}</div></div>
        <div class="stat-card"><div class="stat-label">Avg. RMSE</div><div class="stat-value">${avgRmse}</div></div>
        <div class="stat-card"><div class="stat-label">Perfect scores</div><div class="stat-value">${perfect}</div></div>
      </div>`;

    // Table
    const maxScore = entries[0].score || 1;
    let html = `<div class="table-wrap"><table>
      <thead><tr>
        <th>Rank</th>
        <th>Participant</th>

        <th style="text-align:right">RMSE</th>
      </tr></thead><tbody>`;

    entries.forEach((e, i) => {
      const barW = Math.round((e.score / maxScore) * 100);
      html += `<tr class="${i === 0 ? 'top-row' : ''}">
        <td class="rank-cell">${medals[i] ? '<span class="medal">' + medals[i] + '</span>' : '#' + (i + 1)}</td>
        <td class="participant-cell">${e.participant}</td>

        <td class="diff-cell">${e.rmse.toFixed(3)}</td>
      </tr>`;
    });

    html += '</tbody></table></div>';
    document.getElementById('out').innerHTML = html;

    const dailyGroups = groupByDay(entries);

  let dailyHtml = '<div style="margin-top:40px">';
  dailyHtml += '<h2 style="margin-bottom:10px">📅 Daily Leaderboard</h2>';

  Object.keys(dailyGroups)
    .sort((a, b) => new Date(b) - new Date(a)) // newest first
    .forEach(day => {
      const dayEntries = dailyGroups[day];

      dailyHtml += `
        <h3 style="margin-top:20px">${day}</h3>
        <table style="width:100%; margin-bottom:20px">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Participant</th>
              <th style="text-align:right">RMSE</th>
            </tr>
          </thead>
          <tbody>
      `;

      dayEntries.slice(0, 5).forEach((e, i) => {
        dailyHtml += `
          <tr>
            <td>${medals[i] || '#' + (i + 1)}</td>
            <td>${e.participant}</td>
            <td style="text-align:right">${e.rmse.toFixed(3)}</td>
          </tr>
        `;
      });

      dailyHtml += '</tbody></table>';
    });

  dailyHtml += '</div>';

  // Append below main table
  document.getElementById('out').innerHTML += dailyHtml;

  }

  function loadAndRender() {
    setStatus('loading', 'Refreshing...');
    Papa.parse(CSV_URL + '?nocache=' + Date.now(), {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        const entries = processRows(results.data);
        if (!entries.length) {
          document.getElementById('stats').innerHTML = '';
          document.getElementById('out').innerHTML = '<div class="err-msg">// No valid entries found in CSV.</div>';
          setStatus('error', 'No valid data');
          return;
        }
        render(entries);
        const now = new Date().toLocaleTimeString();
        setStatus('live', 'Live · last updated ' + now + ' · refreshes every ' + REFRESH_SECONDS + 's');
      },
      error: function(err) {
        document.getElementById('out').innerHTML = '<div class="err-msg">// ERROR: ' + (err.message || 'Could not load CSV') + '</div>';
        setStatus('error', 'Failed to load — check URL or CORS settings on GitHub Pages');
      }
    });
    
  }

  loadAndRender();
  setInterval(loadAndRender, REFRESH_SECONDS * 1000);
</script>
</body>
</html>
